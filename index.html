lectedMeeting=m;S.actionItems=[];renderSidebar();  el("empty-state").style.display="none";el("meeting-view").style.display="flex";  el("meeting-title").textContent=m.title;el("meeting-date").textContent=m.date;  var badge=el("meeting-badge");  badge.textContent=S.activeSection==="pre"?"Pre-Close":"Post-Close";  badge.className="badge "+(S.activeSection==="pre"?"badge-pre":"badge-post");  var link=el("meeting-link");  if(m.url){link.href=m.url;link.style.display="inline";}else{link.style.display="none";}  switchTab("email",document.querySelector(".tab"));  el("loading-recap").style.display="flex";el("tab-email").style.display="none";el("tab-actions").style.display="none";  el("email-body").value="";el("email-status").style.display="none";el("sheet-status").style.display="none";  var proj=S.selectedProject;  post({action:"getSummary",recordingId:m.rid})    .then(function(d){      var summary=d.summary||"No summary available.";      var prompt="Draft a meeting recap email for: "+m.title+" ("+m.date+", project: "+proj.name+").\n\nRecording: "+m.url+"\n\nFull meeting summary:\n\n"+summary+"\n\nFirst output action items:\nACTION_ITEMS_JSON:[{\"owner\":\"Name\",\"action\":\"task\",\"due\":\"YYYY-MM-DD or TBD\"}]\n\nThen write EXACTLY:\n\nGood Morning All -\n\nThank you to everyone who joined today's "+m.title+". The recording is available here: "+m.url+"\n\nMeeting Headlines:\n- **[Topic]:** [Specific detail from summary]\n(one bullet per major topic - use real content from summary above)\n\nMeeting Action Items:\n| Owner | Action Item | Due |\n|-------|-------------|-----|\n| ... | ... | ... |\n\nThank you,\nCurt";      return post({action:"draftEmail",prompt:prompt});    })    .then(function(d){      var text=d.text||"";      var rx=/ACTION_ITEMS_JSON:([[\s\S]*?])/;      var match=text.match(rx);      var items=[];      if(match){try{items=JSON.parse(match[1]);}catch(e){}}      S.actionItems=items.map(function(a,i){return{id:i,owner:a.owner||"",action:a.action||"",due:a.due||""};});      var emailBody=text.replace(/ACTION_ITEMS_JSON:\[[\s\S]*?\]\n?/,"").trim();      el("email-body").value=emailBody;      renderActionItems();      el("loading-recap").style.display="none";el("tab-email").style.display="block";    })    .catch(function(e){      el("email-body").value="Error: "+e.message;      el("loading-recap").style.display="none";el("tab-email").style.display="block";    });}function switchTab(tab,btn){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});if(btn)btn.classList.add("active");el("tab-email").style.display=tab==="email"?"block":"none";el("tab-actions").style.display=tab==="actions"?"block":"none";}function renderActionItems(){var tbody=el("action-items-body");tbody.innerHTML="";S.actionItems.forEach(function(a){var tr=document.createElement("tr");tr.innerHTML="<td style=\"width:100px\"><input value=\""+a.owner+"\" onchange=\"updateItem("+a.id+",'owner',this.value)\"/></td><td><input value=\""+a.action+"\" onchange=\"updateItem("+a.id+",'action',this.value)\"/></td><td style=\"width:110px\"><input value=\""+a.due+"\" onchange=\"updateItem("+a.id+",'due',this.value)\"/></td><td style=\"width:30px\"><button class=\"del-btn\" onclick=\"removeItem("+a.id+")\"><i class=\"ti ti-x\"></i></button></td>";tbody.appendChild(tr);});}function updateItem(id,f,v){S.actionItems=S.actionItems.map(function(a){if(a.id===id){var o={};for(var k in a)o[k]=a[k];o[f]=v;return o;}return a;});}function removeItem(id){S.actionItems=S.actionItems.filter(function(a){return a.id!==id;});renderActionItems();}function addActionItem(){S.actionItems.push({id:Date.now(),owner:"",action:"",due:""});renderActionItems();}function copyEmail(){navigator.clipboard.writeText(el("email-body").value).then(function(){showStatus("email-status","Copied!","info");});}function pushToSmartsheet(){var btn=el("btn-smartsheet");btn.disabled=true;btn.innerHTML="<div class=\"spinner\"></div> Pushing...";post({action:"smartsheet",prompt:"Add t
