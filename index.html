<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;--text:#1a1a1a;--text2:#555;--text3:#999;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--green:#0F6E56;--green-light:#E1F5EE;--green-text:#0F6E56;--amber-light:#FAEEDA;--amber-text:#854F0B;--blue:#185FA5;--blue-light:#E6F1FB;--radius:8px;--font:"Inter",sans-serif}
body{font-family:var(--font);background:var(--bg3);color:var(--text);height:100vh;display:flex}
#app{width:100vw;height:100vh;display:flex}
#sidebar{width:240px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.brand{padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:30px;height:30px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center}
.brand-icon i{color:var(--green-light);font-size:16px}.brand-name{font-size:16px;font-weight:600}
.sidebar-scroll{flex:1;overflow-y:auto}
.section-header{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;padding:10px 16px 6px;cursor:pointer}
.section-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}
.section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.proj-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;padding:7px 14px 7px 22px;cursor:pointer}
.proj-item:hover{background:var(--bg2)}.proj-item.active{background:var(--bg2);border-left-color:var(--green)}
.proj-item i{font-size:13px;color:var(--text3);flex-shrink:0}.proj-item.active i{color:var(--green)}
.proj-item span{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.proj-item.active span{color:var(--text);font-weight:500}
.calls-header{padding:8px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-top:0.5px solid var(--border);margin-top:4px}
.call-item{display:block;width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;padding:8px 14px 8px 22px;cursor:pointer}
.call-item:hover{background:var(--bg2)}.call-item.active{background:var(--bg2);border-left-color:var(--green)}
.call-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.call-item.active .call-title{color:var(--green-text)}
.call-date{font-size:11px;color:var(--text3);margin-top:1px}.divider{height:0.5px;background:var(--border);margin:4px 0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.empty-state i{font-size:36px;color:var(--green);opacity:.6}.empty-state h2{font-size:15px;font-weight:500;color:var(--text2)}.empty-state p{font-size:13px}
.main-header{padding:13px 24px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.main-title{font-size:16px;font-weight:600}.main-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:10px}
.badge{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-pre{background:var(--amber-light);color:var(--amber-text)}.badge-post{background:var(--green-light);color:var(--green-text)}
.header-actions{display:flex;gap:8px;flex-shrink:0}
button.action{display:inline-flex;align-items:center;gap:5px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 12px;font-size:12px;font-family:var(--font);cursor:pointer;color:var(--text)}
button.action:hover{background:var(--bg2)}button.action:disabled{opacity:.5;cursor:not-allowed}
button.action.primary{background:var(--green);color:#fff;border-color:var(--green)}button.action.primary:hover{background:#0a5c47}
.tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 24px;flex-shrink:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px 7px;font-size:13px;font-family:var(--font);cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.main-body{flex:1;overflow-y:auto;padding:20px 24px}
textarea#email-body{width:100%;min-height:420px;font-size:13px;line-height:1.75;padding:14px 16px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);resize:vertical;font-family:var(--font)}
textarea#email-body:focus{outline:none;border-color:var(--green)}.email-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
.status-msg{font-size:12px;padding:6px 12px;border-radius:var(--radius)}.status-success{background:var(--green-light);color:var(--green-text)}.status-info{background:var(--blue-light);color:var(--blue)}.status-err{background:#fee2e2;color:#991b1b}
.ai-table{width:100%;border-collapse:collapse;font-size:13px}
.ai-table th{text-align:left;padding:6px 8px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.ai-table td{padding:4px 2px;border-bottom:0.5px solid var(--border)}
.ai-table input{width:100%;border:none;background:transparent;font-size:13px;font-family:var(--font);color:var(--text);padding:4px 6px}.ai-table input:focus{outline:none;background:var(--bg2);border-radius:4px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 6px}
.loading{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:40px 0;justify-content:center}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}a{color:var(--blue);text-decoration:none}
</style></head><body>
<div id="app">
<div id="sidebar"><div class="brand"><div class="brand-icon"><i class="ti ti-antenna-bars-5"></i></div><span class="brand-name">Signal</span></div><div class="sidebar-scroll" id="sidebar-scroll"></div></div>
<div id="main">
<div class="empty-state" id="empty-state"><i class="ti ti-antenna-bars-5"></i><h2>Welcome to Signal</h2><p>Select a project to get started</p></div>
<div id="meeting-view" style="display:none;flex-direction:column;height:100%">
<div class="main-header"><div><div class="main-title" id="meeting-title"></div>
<div class="main-meta"><span id="meeting-date"></span><span class="badge" id="meeting-badge"></span><a id="meeting-link" href="#" target="_blank" style="display:none">View recording <i class="ti ti-external-link" style="font-size:11px"></i></a></div></div>
<div class="header-actions"><button class="action" id="btn-smartsheet" onclick="pushToSmartsheet()"><i class="ti ti-table"></i> Push to Smartsheet</button>
<button class="action primary" id="btn-send" onclick="sendEmail()"><i class="ti ti-send"></i> Send recap</button></div></div>
<div class="tabs"><button class="tab active" onclick="switchTab('email',this)"><i class="ti ti-mail"></i> Recap email</button><button class="tab" onclick="switchTab('actions',this)"><i class="ti ti-checkbox"></i> Action items</button></div>
<div class="main-body"><div class="loading" id="loading-recap"><div class="spinner"></div> Pulling summary from Fathom...</div>
<div id="tab-email" style="display:none"><textarea id="email-body"></textarea><div class="email-actions"><button class="action" onclick="copyEmail()"><i class="ti ti-copy"></i> Copy</button><span id="email-status" class="status-msg" style="display:none"></span></div></div>
<div id="tab-actions" style="display:none"><table class="ai-table"><thead><tr><th>Owner</th><th>Action item</th><th>Due date</th><th></th></tr></thead><tbody id="action-items-body"></tbody></table>
<button class="action" style="margin-top:10px" onclick="addActionItem()"><i class="ti ti-plus"></i> Add row</button><span id="sheet-status" class="status-msg" style="display:none;margin-left:8px"></span></div>
</div></div></div></div>
<script>
var PROXY="/api/proxy";
var PRE=[{id:"692866197546884",name:"Amazing Views",kws:["Amazing Views"]},{id:"981862903506820",name:"Austin Affinity",kws:["Austin Affinity"]},{id:"861021045843844",name:"Branson Vacation Rentals",kws:["Branson"]},{id:"1740680377722756",name:"Mountain West Vacation Rentals",kws:["Mountain West"]},{id:"4106360343291780",name:"The Cohost Company",kws:["Cohost"]}];
var POST=[{id:"2299811031476100",name:"Arrived",kws:["Arrived"]},{id:"1585175718061956",name:"Bach Bros",kws:["Bach Bros"]},{id:"5532527688476548",name:"Continuum Management Group",kws:["CMG"]},{id:"5848960913958788",name:"Element",kws:["Element"]},{id:"8849040398935940",name:"NXT / LJVR",kws:["NXT","LJVR"]},{id:"8319741480724356",name:"SummitCove",kws:["SummitCove"]}];
var S={activeSection:null,selectedProject:null,selectedMeeting:null,meetings:{},actionItems:[]};
function el(id){return document.getElementById(id);}
function post(body){return fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.json();});}
function renderSidebar(){
  var sb=el("sidebar-scroll");sb.innerHTML="";
  ["pre","post"].forEach(function(sec){
    var projs=sec==="pre"?PRE:POST;
    var label=sec==="pre"?"Pre-Close":"Post-Close";
    var color=sec==="pre"?"#EF9F27":"#0F6E56";
    var open=S.activeSection===sec;
    var hdr=document.createElement("button");hdr.className="section-header";
    hdr.innerHTML="<span class=\"section-label\"><span class=\"section-dot\" style=\"background:"+color+"\"></span>"+label+"</span><i class=\"ti ti-chevron-"+(open?"down":"right")+"\" style=\"font-size:12px;color:#999\"></i>";
    hdr.onclick=function(){S.activeSection=open?null:sec;renderSidebar();};
    sb.appendChild(hdr);
    if(open){
      projs.forEach(function(p){
        var btn=document.createElement("button");
        btn.className="proj-item"+(S.selectedProject&&S.selectedProject.id===p.id?" active":"");
        btn.innerHTML="<i class=\"ti ti-building-estate\"></i><span>"+p.name+"</span>";
        btn.onclick=function(){selectProject(p,sec);};
        sb.appendChild(btn);
      });
      if(S.selectedProject&&projs.find(function(p){return p.id===S.selectedProject.id;})){
        var dv=document.createElement("div");dv.className="divider";sb.appendChild(dv);
        var mtgs=S.meetings[S.selectedProject.id];
        var hd=document.createElement("div");hd.className="calls-header";
        hd.textContent=mtgs==="loading"?"Fetching calls...":"Calls - "+S.selectedProject.name;
        sb.appendChild(hd);
        if(mtgs==="loading"){
          var ld=document.createElement("div");ld.style.cssText="display:flex;align-items:center;gap:6px;padding:8px 22px;font-size:13px;color:#999";
          ld.innerHTML="<div class=\"spinner\"></div>";sb.appendChild(ld);
        }else if(!mtgs||mtgs.length===0){
          var nm=document.createElement("div");nm.style.cssText="padding:6px 22px;font-size:13px;color:#999";
          nm.textContent="No recent calls found.";sb.appendChild(nm);
        }else{
          mtgs.forEach(function(m){
            var b=document.createElement("button");
            b.className="call-item"+(S.selectedMeeting&&S.selectedMeeting.id===m.id?" active":"");
            b.innerHTML="<div class=\"call-title\">"+m.title+"</div><div class=\"call-date\">"+m.date+"</div>";
            b.onclick=function(){selectMeeting(m);};
            sb.appendChild(b);
          });
        }
      }
    }
    var d2=document.createElement("div");d2.className="divider";sb.appendChild(d2);
  });
}
function selectProject(proj,sec){
  S.selectedProject=proj;S.activeSection=sec;S.selectedMeeting=null;S.meetings[proj.id]="loading";
  el("empty-state").style.display="flex";el("meeting-view").style.display="none";
  renderSidebar();
  var kws=proj.kws||[proj.name];var seen={};var merged=[];
  var promises=kws.map(function(kw){
    return post({action:"searchCalls",keyword:kw})
      .then(function(d){
        var calls=d.calls||[];
        calls.forEach(function(c){if(c.id&&!seen[c.id]){seen[c.id]=true;merged.push(c);}});
      }).catch(function(){});
  });
  Promise.all(promises).then(function(){
    merged.sort(function(a,b){return(b.date||"").localeCompare(a.date||"");});
    S.meetings[proj.id]=merged;renderSidebar();
  });
}
function selectMeeting(m){
  S.selectedMeeting=m;S.actionItems=[];renderSidebar();
  el("empty-state").style.display="none";el("meeting-view").style.display="flex";
  el("meeting-title").textContent=m.title;el("meeting-date").textContent=m.date;
  var badge=el("meeting-badge");
  badge.textContent=S.activeSection==="pre"?"Pre-Close":"Post-Close";
  badge.className="badge "+(S.activeSection==="pre"?"badge-pre":"badge-post");
  var link=el("meeting-link");
  if(m.url){link.href=m.url;link.style.display="inline";}else{link.style.display="none";}
  switchTab("email",document.querySelector(".tab"));
  el("loading-recap").style.display="flex";el("tab-email").style.display="none";el("tab-actions").style.display="none";
  el("email-body").value="";el("email-status").style.display="none";el("sheet-status").style.display="none";
  post({action:"getSummary",callId:m.id})
    .then(function(summary){
      var summaryText=JSON.stringify(summary);
      var proj=S.selectedProject;
      var prompt="Draft a meeting recap email for: "+m.title+" ("+m.date+", project: "+proj.name+", recording: "+(m.url||"see Fathom")+").\n\nHere is the full meeting summary:\n\n"+summaryText+"\n\nFirst output action items on one line:\nACTION_ITEMS_JSON:[{\"owner\":\"Name\",\"action\":\"task\",\"due\":\"YYYY-MM-DD or TBD\"}]\n\nThen write the email body EXACTLY like this:\n\nGood Morning All -\n\nThank you to everyone who joined today's "+m.title+". The recording is available here: "+(m.url||"see Fathom")+".\n\nMeeting Headlines:\n- **[Topic]:** [Specific detail from the summary above]\n(include all major topics as bullets - be specific and detailed)\n\nMeeting Action Items:\n| Owner | Action Item | Due |\n|-------|-------------|-----|\n| ... | ... | ... |\n\nThank you,\nCurt";
      return post({action:"draftEmail",prompt:prompt});
    })
    .then(function(d){
      var text=d.text||"";
      var rx=/ACTION_ITEMS_JSON:([[\s\S]*?])/;
      var match=text.match(rx);
      var items=[];
      if(match){try{items=JSON.parse(match[1]);}catch(e){}}
      S.actionItems=items.map(function(a,i){return{id:i,owner:a.owner||"",action:a.action||"",due:a.due||""};});
      var emailBody=text.replace(/ACTION_ITEMS_JSON:\[[\s\S]*?\]\n?/,"").trim();
      el("email-body").value=emailBody;
      renderActionItems();
      el("loading-recap").style.display="none";el("tab-email").style.display="block";
    })
    .catch(function(e){
      el("email-body").value="Error: "+e.message;
      el("loading-recap").style.display="none";el("tab-email").style.display="block";
    });
}
function switchTab(tab,btn){document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});if(btn)btn.classList.add("active");el("tab-email").style.display=tab==="email"?"block":"none";el("tab-actions").style.display=tab==="actions"?"block":"none";}
function renderActionItems(){var tbody=el("action-items-body");tbody.innerHTML="";S.actionItems.forEach(function(a){var tr=document.createElement("tr");tr.innerHTML="<td style=\"width:100px\"><input value=\""+a.owner+"\" onchange=\"updateItem("+a.id+",'owner',this.value)\"/></td><td><input value=\""+a.action+"\" onchange=\"updateItem("+a.id+",'action',this.value)\"/></td><td style=\"width:110px\"><input value=\""+a.due+"\" onchange=\"updateItem("+a.id+",'due',this.value)\"/></td><td style=\"width:30px\"><button class=\"del-btn\" onclick=\"removeItem("+a.id+")\"><i class=\"ti ti-x\"></i></button></td>";tbody.appendChild(tr);});}
function updateItem(id,f,v){S.actionItems=S.actionItems.map(function(a){if(a.id===id){var o={};for(var k in a)o[k]=a[k];o[f]=v;return o;}return a;});}
function removeItem(id){S.actionItems=S.actionItems.filter(function(a){return a.id!==id;});renderActionItems();}
function addActionItem(){S.actionItems.push({id:Date.now(),owner:"",action:"",due:""});renderActionItems();}
function copyEmail(){navigator.clipboard.writeText(el("email-body").value).then(function(){showStatus("email-status","Copied!","info");});}
function pushToSmartsheet(){var btn=el("btn-smartsheet");btn.disabled=true;btn.innerHTML="<div class=\"spinner\"></div> Pushing...";post({action:"mcp",service:"smartsheet",prompt:"Add these action items to Smartsheet for project "+S.selectedProject.name+" from meeting "+S.selectedMeeting.title+". Find or create sheet called "+S.selectedProject.name+" Action Items with columns Owner, Action Item, Due Date. Items: "+JSON.stringify(S.actionItems)}).then(function(d){showStatus("sheet-status",d.text||"Pushed!","success");}).catch(function(){showStatus("sheet-status","Check Smartsheet.","info");}).finally(function(){btn.disabled=false;btn.innerHTML="<i class=\"ti ti-table\"></i> Push to Smartsheet";});}
function sendEmail(){var btn=el("btn-send");btn.disabled=true;btn.innerHTML="<div class=\"spinner\"></div> Sending...";var body=el("email-body").value;post({action:"mcp",service:"m365",prompt:"Send email to myself subject: Meeting Recap - "+S.selectedMeeting.title+". Body:\n\n"+body}).then(function(d){showStatus("email-status",d.text||"Sent!","success");}).catch(function(){showStatus("email-status","Copy and paste manually.","info");}).finally(function(){btn.disabled=false;btn.innerHTML="<i class=\"ti ti-send\"></i> Send recap";});}
function showStatus(id,msg,type){var e=el(id);e.textContent=msg;e.className="status-msg status-"+type;e.style.display="inline-block";}
renderSidebar();
</script></body></html>
